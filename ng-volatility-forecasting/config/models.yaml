training:
  cv_splits: 5

models:
  har:
    enabled: true
    features: ["rv_5d", "rv_10d", "storage_surprise", "m1_m12_slope"]

  random_forest:
    enabled: true
    features: "all"
    params:
      n_estimators: 300
      max_depth: 6
      min_samples_leaf: 3
      n_jobs: -1
      random_state: 42
