targets:
  horizon_days: 10
  target_column: "target_rv_fwd"

volatility:
  windows: [5, 10, 20]
  annualization_factor: 252

curve:
  enable: true
  slopes:
    - { name: "m1_m3_slope", long: "M3", short: "M1" }
    - { name: "m1_m12_slope", long: "M12", short: "M1" }

storage:
  enable: true
  change_days: 7
  rolling_mean_years: 5
  surprise_name: "storage_surprise"

fundamentals:
  enable: true
  delta_days: 7
  columns: ["prod", "demand", "lng_exports"]

weather:
  enable: true
  anomaly_days: 3650

drop_na: true
